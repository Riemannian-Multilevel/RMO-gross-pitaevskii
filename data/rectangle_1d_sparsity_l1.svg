  <rect class="pixel" x="2" y="1" width=".9" height=".9"/>
  <rect class="pixel" x="2" y="2" width=".9" height=".9"/>
  <rect class="pixel" x="1" y="2" width=".9" height=".9"/>
  <rect class="pixel" x="3" y="2" width=".9" height=".9"/>
